<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>프린터 연결 테스트</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        button { 
            padding: 15px 30px; font-size: 18px; margin: 10px; 
            cursor: pointer; border-radius: 8px; border: none;
        }
        #connectBtn { background-color: #4CAF50; color: white; }
        #printBtn { background-color: #2196F3; color: white; }
        .status { margin: 20px; color: #666; }
    </style>
</head>
<body>

    <h2>🖨️ 블루투스 프린터 테스트</h2>
    <p class="status" id="status">상태: 연결 전</p>

    <button id="connectBtn">1. 프린터 찾기 및 연결</button>
    <br>
    <button id="printBtn" disabled>2. 테스트 문구 인쇄</button>

    <script>
        // --- 1. 작성하신 클래스 (그대로 활용) ---
        class WebBluetoothPrinter {
            constructor() {
                this.device = null;
                this.characteristic = null;
            }

            async connect() {
                try {
                    // 기기 검색 (서비스 UUID는 프린터마다 다를 수 있음)
                    this.device = await navigator.bluetooth.requestDevice({
                        // 모든 프린터를 찾고 싶다면 acceptAllDevices: true를 쓰고 
                        // optionalServices에 해당 UUID를 넣으세요.
                        filters: [{ services: ['000018f0-0000-1000-8000-00805f9b34fb'] }], 
                        optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb']
                    });

                    const server = await this.device.gatt.connect();
                    const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
                    const characteristics = await service.getCharacteristics();
                    
                    // 쓰기 가능한 특성 찾기
                    this.characteristic = characteristics.find(c => c.properties.write || c.properties.writeWithoutResponse);
                    
                    if (this.characteristic) {
                        document.getElementById('status').innerText = "상태: 연결 성공! (" + this.device.name + ")";
                        document.getElementById('printBtn').disabled = false;
                        alert("연결되었습니다!");
                    }
                } catch (error) {
                    console.error("연결 실패:", error);
                    document.getElementById('status').innerText = "상태: 연결 실패 - " + error.message;
                }
            }

            async printRaw(data) {
                if (!this.characteristic) {
                    alert("프린터가 연결되지 않았습니다.");
                    return;
                }
                const chunkSize = 20; // 저가형은 한번에 20바이트씩 보내는게 안전할 때가 많음
                for (let i = 0; i < data.byteLength; i += chunkSize) {
                    await this.characteristic.writeValue(data.slice(i, i + chunkSize));
                }
            }

            async printText(text) {
                // 한글 깨짐 방지를 위해 가장 안전한 영문 먼저 테스트
                const encoder = new TextEncoder(); 
                const data = encoder.encode(text + "\n\n\n");
                await this.printRaw(data);
            }
        }

        // --- 2. 버튼 이벤트 바인딩 ---
        const printer = new WebBluetoothPrinter();

        document.getElementById('connectBtn').onclick = () => {
            printer.connect();
        };

        document.getElementById('printBtn').onclick = async () => {
            const testTitle = "--- KONKUK UNIV ---\n";
            const testBody = "Hello, Professor!\nPhoto Print Success!\n";
            const line = "-------------------\n";
            
            await printer.printText(testTitle + testBody + line);
        };
    </script>
</body>
</html>
