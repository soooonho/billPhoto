<!doctype html>
<html>
  <head>
    <title>Tablet Camera Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body style="text-align: center; background: #f0f0f0">
    <div id="cameraArea">
      <div style="text-align: center; margin-top: 20px">
        <video
          id="webcam"
          autoplay
          playsinline
          style="width: 100%; max-width: 500px; border-radius: 15px"
        ></video>

        <canvas id="photoCanvas" style="display: none"></canvas>

        <br />

        <button
          id="captureBtn"
          style="
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 5px solid #fff;
            background: red;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            font-weight: bold;
            color: white;
          "
        >
          SHOT
        </button>
      </div>

      <h1>태블릿 카메라 연결 성공!</h1>
      <div
        id="statusDisplay"
        style="font-size: 24px; color: red; font-weight: bold; margin: 10px"
      >
        준비 버튼을 눌러주세요!
      </div>
    </div>
    <div id="selectArea">
      <div class="photo-grid">
        <img id="result-0" src="" alt="첫 번째 사진" width="200" />
        <img id="result-1" src="" alt="두 번째 사진" width="200" />
        <img id="result-2" src="" alt="세 번째 사진" width="200" />
        <img id="result-3" src="" alt="네 번째 사진" width="200" />
        <img id="result-4" src="" alt="다섯 번째 사진" width="200" />
        <img id="result-5" src="" alt="여섯 번째 사진" width="200" />
      </div>
      <button
        onclick="location.reload()"
        style="padding: 15px 30px; font-size: 18px; cursor: pointer"
      >
        다시 찍기
      </button>

      <button
        id="nextBtn"
        style="
          padding: 15px 50px;
          font-size: 18px;
          background: #007bff;
          color: white;
          border: none;
          border-radius: 5px;
          cursor: pointer;
          margin-left: 10px;
        "
      >
        다음 단계로
      </button>
    </div>
    <div id="resultArea">
      <img id="result" src="" width="200" />
    </div>

    <script>
      let selectedPhotos = [];
      const python_api_url = "http://192.168.1.108:5000";
      const delay = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
      async function sendImagesToPython(base64Arr) {
        try {
          const response = await fetch(python_api_url + "/upload", {
            method: "POST",

            headers: {
              "Content-Type": "application/json",
            },

            body: JSON.stringify({
              images: base64Arr, // 캔버스에서 추출한 이미지 데이터
            }),
          });

          const result = await response.json();
          if (result.status === "success") {
            result.processed_images.forEach((base64, index) => {
              const imgTag = document.getElementById(`result-${index}`);
              if (imgTag) imgTag.src = base64;
            });
          }
          cameraArea.style.display = "none";
          selectArea.style.display = "block";
        } catch (error) {
          console.error("전송 중 에러 발생:", error);
        }
      }

      async function initCamera() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user" },
          });

          document.getElementById("webcam").srcObject = stream;
        } catch (err) {
          alert("카메라 권한을 허용해주세요: " + err);
        }
      }

      const video = document.getElementById("webcam");
      const canvas = document.getElementById("photoCanvas");
      const captureBtn = document.getElementById("captureBtn");
      const statusDisplay = document.getElementById("statusDisplay");
      const cameraArea = document.getElementById("cameraArea");
      const selectArea = document.getElementById("selectArea");
      const resultArea = document.getElementById("resultArea");
      captureBtn.addEventListener("click", async () => {
        selectArea.style.display = "none";
        cameraArea.style.display = "block";
        let photoBundle = [];
        for (let i = 0; i < 6; i++) {
          // 1. 캔버스에 현재 비디오 프레임을 그립니다 (캡처)
          for (let sec = 1; sec > 0; sec--) {
            statusDisplay.innerText = `📸 ${i + 1}번째 사진 촬영까지 ${sec}초 남음!`;
            await delay(1000); // 1초씩 기다림
          }
          const context = canvas.getContext("2d");

          canvas.width = video.videoWidth;

          canvas.height = video.videoHeight;

          context.drawImage(video, 0, 0, canvas.width, canvas.height);

          // 2. 캔버스의 이미지를 문자열(Base64) 형태로 변환합니다

          const imageData = canvas.toDataURL("image/png");

          photoBundle.push(imageData);
        }

        sendImagesToPython(photoBundle);
      });
      const photoGrid = document.querySelector(".photo-grid");

      photoGrid.addEventListener("click", (event) => {
        // 클릭된 요소가 IMG 태그인지 확인합니다.
        if (event.target.tagName === "IMG") {
          const clickedImg = event.target;
          const index = selectedPhotos.indexOf(clickedImg.src);
          if (index > -1) {
            selectedPhotos.splice(index, 1);
            clickedImg.style.opacity = "1";
          } else {
            if (selectedPhotos.length < 4) {
              selectedPhotos.push(clickedImg.src);
              clickedImg.style.opacity = "0.7"; // 선택됐다는 시각적 효과
            }
          }
        }
      });
      const nextBtn = document.getElementById("nextBtn");
      nextBtn.addEventListener("click", async () => {
        // 1. 선택된 사진이 있는지 확인
        if (selectedPhotos.length === 4) {
          // 2. 서버로 전송 (진행 중 표시)
          nextBtn.innerText = "처리 중...";
          nextBtn.disabled = true;

          try {
            const response = await fetch(python_api_url + "/upload_selected", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                selected_images: selectedPhotos, // 전역 배열에 담긴 데이터 전송
              }),
            });

            const result = await response.json();

            if (result.status === "success") {
              const finalPhoto = document.getElementById("result");
              selectArea.style.display = "none";
              resultArea.style.display = "block";
              finalPhoto.src = result.result_image;
            }
          } catch (error) {
            console.error("전송 에러:", error);
            alert("서버 연결에 실패했습니다.");
          } finally {
            nextBtn.innerText = "다음 단계로";
            nextBtn.disabled = false;
          }
        }
      });
      selectArea.style.display = "none";
      cameraArea.style.display = "block";
      resultArea.style.display = "none";
      initCamera();
    </script>
  </body>
</html>
