<!doctype html>
<html>
  <head>
    <title>Tablet Camera Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body style="text-align: center">
    <div id="loadingMark" class="loader"></div>
    <div id="cameraArea" class="step-section">
      <div style="text-align: center; margin-top: 20px">
        <div class="video-container">
          <video
            id="webcam"
            autoplay
            playsinline
            style="
              width: 100vw; /* 브라우저 너비의 100% */
              height: 100vh; /* 브라우저 높이의 100% */
              object-fit: cover; /* 비율을 유지하면서 화면에 꽉 차게 자름 (가장 중요!) */
              position: fixed; /* 화면에 고정 */
              top: 0;
              left: 0;
              z-index: -1; /* 버튼들이 비디오 위에 보이도록 뒤로 보냄 */
            "
          ></video>
          <div class="frame-overlay"></div>
          <div class="frame-ovelay2"></div>
        </div>
        <canvas id="photoCanvas" style="display: none"></canvas>

        <br />

        <button id="captureBtn">SHOT</button>
        <div id="statusDisplay"></div>
      </div>
    </div>
    <div id="selectArea" class="step-section">
      <div class="photo-grid">
        <img id="result-0" class="photo-item" src="" alt="첫 번째 사진" />
        <img id="result-1" class="photo-item" src="" alt="두 번째 사진" />
        <img id="result-2" class="photo-item" src="" alt="세 번째 사진" />
        <img id="result-3" class="photo-item" src="" alt="네 번째 사진" />
        <img id="result-4" class="photo-item" src="" alt="다섯 번째 사진" />
        <img id="result-5" class="photo-item" src="" alt="여섯 번째 사진" />
      </div>
      <div id="selectBtn">
        <button
          id="reloadBtn"
          onclick="location.reload()"
          style="padding: 15px 30px; font-size: 18px; cursor: pointer"
        >
          다시 찍기
        </button>

        <button id="nextBtn">다음 단계로</button>
      </div>
    </div>
    <div id="resultArea" class="step-section">
      <img id="result" src="" width="200" />
    </div>

    <script>
      const cameraArea = document.getElementById("cameraArea");
      const selectArea = document.getElementById("selectArea");
      const resultArea = document.getElementById("resultArea");
      const captureBtn = document.getElementById("captureBtn");
      function resetPage() {
        document
          .querySelectorAll(".step-section")
          .forEach((area) => (area.style.display = "none"));
        cameraArea.style.display = "block";
        captureBtn.innerText = "SHOT";
        captureBtn.style.fontSize = "13px";
      }
      function openFullscreen() {
        const elem = document.documentElement; // 페이지 전체
        if (elem.requestFullscreen) {
          elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) {
          /* 사파리/태블릿용 */
          elem.webkitRequestFullscreen();
        } else if (elem.msRequestFullscreen) {
          /* IE11용 */
          elem.msRequestFullscreen();
        }
      }
      document.addEventListener("click", () => {
        //console.log("클릭된 요소:", e.target);
        if (window.getComputedStyle(resultArea).display == "block") {
          resetPage();
        }
        openFullscreen();
      });
      let selectedPhotos = [];
      const python_api_url = "http://192.168.1.64:5000";
      const delay = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
      const loadingMark = document.getElementById("loadingMark");
      async function sendImagesToPython(base64Arr) {
        try {
          const response = await fetch(python_api_url + "/upload", {
            method: "POST",

            headers: {
              "Content-Type": "application/json",
            },

            body: JSON.stringify({
              images: base64Arr, // 캔버스에서 추출한 이미지 데이터
            }),
          });

          const result = await response.json();
          if (result.status === "success") {
            result.processed_images.forEach((base64, index) => {
              const imgTag = document.getElementById(`result-${index}`);
              if (imgTag) imgTag.src = base64;
            });
          }
          selectedPhotos = [];
          cameraArea.style.display = "none";
          selectArea.style.display = "block";
          captureBtn.disabled = false;

          document.getElementById("selectBtn").style.display = "block";
        } catch (error) {
          console.error("전송 중 에러 발생:", error);
        }
        loadingMark.classList.remove("active");
      }

      async function initCamera() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user" },
          });

          document.getElementById("webcam").srcObject = stream;
        } catch (err) {
          alert("카메라 권한을 허용해주세요: " + err);
        }
      }

      const video = document.getElementById("webcam");
      const canvas = document.getElementById("photoCanvas");
      const statusDisplay = document.getElementById("statusDisplay");

      captureBtn.addEventListener("click", async () => {
        captureBtn.disabled = true;
        selectArea.style.display = "none";
        cameraArea.style.display = "block";
        let photoBundle = [];
        for (let i = 0; i < 6; i++) {
          // 1. 캔버스에 현재 비디오 프레임을 그립니다 (캡처)
          for (let sec = 2; sec > 0; sec--) {
            captureBtn.innerText = `${sec}`;
            captureBtn.style.fontSize = "60px";
            await delay(1000); // 1초씩 기다림
          }

          const context = canvas.getContext("2d");

          canvas.width = video.videoWidth;

          canvas.height = video.videoHeight;

          context.drawImage(video, 0, 0, canvas.width, canvas.height);

          // 2. 캔버스의 이미지를 문자열(Base64) 형태로 변환합니다

          const imageData = canvas.toDataURL("image/png");

          photoBundle.push(imageData);
        }
        loadingMark.classList.add("active");
        sendImagesToPython(photoBundle);
      });
      const photoGrid = document.querySelector(".photo-grid");

      photoGrid.addEventListener("click", (event) => {
        // 클릭된 요소가 IMG 태그인지 확인합니다.
        if (event.target.tagName === "IMG") {
          const clickedImg = event.target;
          const index = selectedPhotos.indexOf(clickedImg.src);
          if (index > -1) {
            selectedPhotos.splice(index, 1);
            clickedImg.style.opacity = "1";
          } else {
            if (selectedPhotos.length < 4) {
              selectedPhotos.push(clickedImg.src);
              clickedImg.style.opacity = "0.7"; // 선택됐다는 시각적 효과
            }
          }
        }
      });
      const nextBtn = document.getElementById("nextBtn");
      nextBtn.addEventListener("click", async () => {
        // 1. 선택된 사진이 있는지 확인
        if (selectedPhotos.length === 4) {
          loadingMark.classList.add("active");
          // 2. 서버로 전송 (진행 중 표시)
          nextBtn.innerText = "처리 중...";
          nextBtn.disabled = true;

          try {
            const response = await fetch(python_api_url + "/upload_selected", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                selected_images: selectedPhotos, // 전역 배열에 담긴 데이터 전송
              }),
            });

            const result = await response.json();

            if (result.status === "success") {
              loadingMark.classList.remove("active");
              const finalPhoto = document.getElementById("result");
              selectArea.style.display = "none";
              resultArea.style.display = "block";
              finalPhoto.src = result.result_image;
            }
          } catch (error) {
            console.error("전송 에러:", error);
            alert("서버 연결에 실패했습니다.");
          } finally {
            nextBtn.innerText = "다음 단계로";
            nextBtn.disabled = false;
            const allPhotos = document.querySelectorAll(".photo-item");

            // 2. 각각의 사진 태그에 직접 "투명도 1"을 명령합니다.
            allPhotos.forEach((img) => {
              img.style.opacity = "1";
            });
          }
        }
      });
      selectArea.style.display = "none";
      cameraArea.style.display = "block";
      resultArea.style.display = "none";
      initCamera();
    </script>
  </body>
</html>
